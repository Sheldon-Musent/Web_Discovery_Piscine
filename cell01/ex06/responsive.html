<html>

  <head>
    <title></title>
    <style>

      body{
        margin: 0%;
      }

      .box{
        width: 100%;
        line-height: 100px;
        height: 100vh;
        table-layout: fixed;
      }

      .box1{
        background-color: green;
      }

      .box2{
        background-color: red;
      }

      td {
        width: 50%;
        outline: 1px solid black;
      }
    </style>

  </head>
  
  <body>
    <table class="box" cellspacing="1">
      <tr>
          <td class="box1">
            Left
          </td>
          <td class="box2">
            Right
          </td>
      </tr>
    </table>
  </body>
  
</html>
