<html>

  <head>

    <title></title>

    <style>

      hr {
        border: 0px;
        height: 1px;
        background-color: #000000;
      }

      .box{
        width: 100%;
        line-height: 100px;
        table-layout: fixed;
      }

      td {
        width: 50%;
        outline: 1px solid black;
      }

    </style>

  </head>
  
  <body>

    <hr>

    <table class="box" cellspacing="1">
      <tr>
          <td style="background-color: green;">
            Left
          </td>
          <td style="background-color: red;">
            Right
          </td>
      </tr>
    </table>

  </body>
</html>
