<html>

  <head>
    <title>Tab</title>
    <style>
      hr {                                      /*line style*/
        border: 0px;
        height: 1px;
        background-color: #000000;
      }

      .box{
        width: 100%;
        line-height: 100px;
        table-layout: fixed;
      }
    </style>
  </head>
  
  <body>
    <hr>                                        <!--line-->
    <table class="box" cellspacing="0">         <!-- default cell have spacing make it stick tgt -->
      <tr>                                      <!-- tr = table row -->
          <!-- td = one cell each td takes width 50% if 3 td will shrink to fit 33% -->
          <td style="background-color: green;"> 
            Left
          </td>
          <td style="background-color: red;">
            Right
          </td>
      </tr>
    </table>

  </body>
</html>
