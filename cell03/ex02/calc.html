<!DOCTYPE html>

<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="calc.css">
    <script src="calc.js"></script>
  </head>

  <body>
    <!--creates an 'input' field where the user can type-->
    <!--type=text(accept text and numbers)-->
    <input type="text" id="left">
    <!--select create drop down with option-->
    <select id="operator">
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
      <option value="%">%</option>
    </select>
    <input type="text" id="right">
    <button onclick="calculate()">Try me!</button>
  </body>
</html>
