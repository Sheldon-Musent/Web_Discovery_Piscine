<!DOCTYPE html>

<html>
  <head>
      <title>Dropdown Menu</title>
      <link rel="stylesheet" href="menu.css">
  </head>

  <body>
    <div class="dropdown">                                <!--use div to group them-->
        <button class="dropbtn">Dropdown Menu</button>    <!--inside div u have a button to click-->
        <div class="dropdown-content">                    <!--group the 3 links-->
          <a href="#">Link 1</a>                          <!--# = no link no destination-->
          <a href="#">Link 2</a>
          <a href="#">Link 3</a>
        </div>
    </div>
  </body>
  
</html>
