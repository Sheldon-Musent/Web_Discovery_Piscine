<!DOCTYPE html>
<html>
  <head>
    <title>User profile card</title>
    <link rel="stylesheet" href="card.css">
  </head>

  <body>
    <div class="title">
      User Profile Card
    </div>

    <div class="card">

      <div class="img">
        <img src="Shechen.jpg" width="300" height="auto" alt="Shechen">
      </div>

      <div class="name">
        Shechen 26
      </div>

      <div class="description">
        Level 1, Solo Leveling 
      </div>

      <div class="description2">
        42KL
      </div>

      <div class="icon">
        <div class="fb-icon">
          <img src="fb.svg" width="35" height="auto" alt="fb">
        </div>

        <div class="tiktok-icon">
          <img src="tiktok.svg" width="35" height="auto" alt="tiktok">
        </div>

        <div class="ig-icon">
          <img src="ig.svg" width="35" height="auto" alt="ig">
        </div>

        <div class="more-icon">
          <img src="flickr.svg" width="35" height="auto" alt="more">
        </div>
      </div>

      <div class="contact">
        Contact
      </div>

    </div>

  </body>
</html>
